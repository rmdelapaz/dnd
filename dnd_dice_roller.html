<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5th Edition Dice Roller</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f1117;
            color: #c9cdd8;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            max-width: 960px;
            line-height: 1.6;
        }

        h1 { font-size: clamp(1.8rem,5vw,3rem); color:#e8ebf2; font-weight:700; text-align:center; margin-bottom:4px; }
        h2 { font-size: 1.15rem; font-weight:700; color:#e8ebf2; background:#232734; border-left:4px solid #3b82f6; padding:0.6rem 1rem; border-radius:8px; margin:0 0 16px 0; text-align:left; }
        .subtitle { font-size:1.1em; color:#7c8298; margin-bottom:24px; font-style:italic; text-align:center; }

        .dice-section { background:#1a1d27; border-radius:8px; padding:20px; margin:16px 0; border:1px solid #2e3347; }

        /* --- Quick action buttons --- */
        .quick-actions { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px; margin:0 0 12px 0; }
        .quick-group { display:flex; gap:0; }
        .quick-group .quick-adv-btn { flex:0 0 auto; padding:10px 10px; font-size:0.78em; font-weight:700; border:1px solid #2e3347; cursor:pointer; transition:all .2s; font-family:inherit; background:#232734; }
        .quick-group .quick-adv-btn.disadv { border-radius:8px 0 0 8px; color:#f87171; border-right:none; }
        .quick-group .quick-adv-btn.disadv:hover { background:rgba(239,68,68,0.2); border-color:#ef4444; }
        .quick-group .quick-adv-btn.adv { border-radius:0 8px 8px 0; color:#4ade80; border-left:none; }
        .quick-group .quick-adv-btn.adv:hover { background:rgba(34,197,94,0.2); border-color:#22c55e; }
        .quick-group .quick-btn { flex:1; border-radius:0; }
        .quick-btn { background:#232734; border:1px solid #3b82f6; border-radius:8px; color:#60a5fa; padding:10px 12px; font-size:0.9em; cursor:pointer; transition:all .2s; font-weight:600; font-family:inherit; }
        .quick-btn:hover { background:#3b82f6; color:#fff; }

        /* --- Advantage toggle (inside quick actions) --- */
        .advantage-row { display:flex; justify-content:center; gap:10px; margin:12px 0 0 0; flex-wrap:wrap; }
        .advantage-row.disabled { opacity:0.35; pointer-events:none; }
        .adv-btn { background:#232734; border:1px solid #2e3347; border-radius:8px; color:#7c8298; padding:8px 18px; cursor:pointer; transition:all .2s; font-family:inherit; font-size:0.9em; font-weight:600; }
        .adv-btn.active { border-color:#3b82f6; background:rgba(59,130,246,0.15); color:#60a5fa; }
        .adv-btn.adv-advantage.active { border-color:#22c55e; background:rgba(34,197,94,0.15); color:#4ade80; }
        .adv-btn.adv-disadvantage.active { border-color:#ef4444; background:rgba(239,68,68,0.15); color:#f87171; }
        .adv-label { font-size:0.85em; color:#7c8298; text-align:center; margin-top:8px; }

        /* --- Dice grid --- */
        .dice-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(105px,1fr)); gap:10px; margin:0 0 16px 0; }
        .die-type { background:#232734; border-radius:8px; padding:12px 8px; border:1px solid; text-align:center; }
        .die-name { font-size:1.15em; font-weight:700; color:#e8ebf2; margin-bottom:6px; }
        .die-controls { display:flex; align-items:center; justify-content:center; gap:6px; }
        .die-controls button { background:#2e3347; border:none; border-radius:6px; color:#e8ebf2; width:32px; height:32px; font-size:1.1em; font-weight:bold; cursor:pointer; transition:background .2s; font-family:inherit; display:flex; align-items:center; justify-content:center; }
        .die-controls button:hover { background:#3b82f6; color:#fff; }
        .die-controls input { background:#0f1117; border:1px solid #2e3347; border-radius:6px; padding:4px; color:#e8ebf2; text-align:center; width:44px; font-size:1em; font-family:inherit; }

        .d4 { border-color:#f87171; } .d6 { border-color:#34d399; } .d8 { border-color:#60a5fa; }
        .d10 { border-color:#a78bfa; } .d12 { border-color:#fbbf24; } .d20 { border-color:#f472b6; } .d100 { border-color:#818cf8; }

        /* --- Modifier --- */
        .modifier-section { display:flex; align-items:center; justify-content:center; gap:12px; margin:16px 0; flex-wrap:wrap; }
        .modifier-section span { font-size:1em; font-weight:700; color:#e8ebf2; }
        .modifier-section input { background:#0f1117; border:1px solid #2e3347; border-radius:8px; padding:6px 10px; color:#e8ebf2; text-align:center; width:70px; font-size:1em; font-family:inherit; }

        /* --- Roll / Clear buttons --- */
        .action-row { text-align:center; margin:20px 0 0 0; }
        .roll-btn { background:#2563eb; border:none; border-radius:8px; color:#fff; padding:14px 44px; font-size:1.4em; font-weight:700; cursor:pointer; transition:all .2s; text-transform:uppercase; letter-spacing:2px; font-family:inherit; }
        .roll-btn:hover { background:#1d4ed8; transform:scale(1.03); }
        .clear-btn { background:#232734; border:1px solid #2e3347; border-radius:8px; color:#7c8298; padding:10px 20px; cursor:pointer; margin-left:10px; transition:all .2s; font-family:inherit; font-size:0.95em; }
        .clear-btn:hover { background:#2e3347; color:#c9cdd8; }

        /* --- Modal results overlay --- */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.visible { display:flex; }
        .modal-inner { background:#1a1d27; border:1px solid #2e3347; border-radius:8px; padding:28px 24px 24px; max-width:480px; width:100%; position:relative; text-align:center; }
        .close-btn { position:absolute; top:10px; right:10px; background:#2e3347; border:none; border-radius:6px; color:#c9cdd8; width:30px; height:30px; font-size:1.2em; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; padding:0; line-height:1; font-family:inherit; }
        .close-btn:hover { background:#ef4444; color:#fff; }

        .result-total { font-size:clamp(2.5rem,8vw,4rem); font-weight:700; margin:12px 0; padding:16px; background:rgba(59,130,246,0.1); border-radius:8px; border:1px solid #3b82f6; color:#60a5fa; }
        .result-breakdown { font-size:1em; margin:10px 0; color:#7c8298; }
        .dice-results { display:flex; justify-content:center; gap:10px; margin:16px 0; flex-wrap:wrap; }
        .result-die { width:44px; height:44px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1em; font-weight:700; color:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.3); border:2px solid; }
        .result-die.critical { animation:glow 1s infinite alternate; }
        .result-die.fumble { animation:shake .5s infinite alternate; }
        @keyframes glow { from{box-shadow:0 2px 8px rgba(0,0,0,0.3)} to{box-shadow:0 4px 20px rgba(96,165,250,0.7)} }
        @keyframes shake { from{transform:translateX(-2px)} to{transform:translateX(2px)} }
        .critical-text { color:#60a5fa; font-size:1.3em; font-weight:700; margin:8px 0; }
        .fumble-text { color:#f87171; font-size:1.3em; font-weight:700; margin:8px 0; }
    </style>
</head>
<body>
    <h1>D&D 5th Edition</h1>
    <div class="subtitle">Dice Roller</div>

    <!-- Quick Actions + Advantage -->
    <div class="dice-section">
        <h2>Quick Actions</h2>
        <div class="quick-actions">
            <div class="quick-group">
                <button class="quick-adv-btn disadv" onclick="quickRoll('1d20','attack','disadvantage')" title="Disadvantage">DISADV</button>
                <button class="quick-btn" onclick="quickRoll('1d20','attack','normal')">Attack Roll (1d20)</button>
                <button class="quick-adv-btn adv" onclick="quickRoll('1d20','attack','advantage')" title="Advantage">ADV</button>
            </div>
            <div class="quick-group">
                <button class="quick-adv-btn disadv" onclick="quickRoll('1d20','save','disadvantage')" title="Disadvantage">DISADV</button>
                <button class="quick-btn" onclick="quickRoll('1d20','save','normal')">Saving Throw (1d20)</button>
                <button class="quick-adv-btn adv" onclick="quickRoll('1d20','save','advantage')" title="Advantage">ADV</button>
            </div>
            <div class="quick-group">
                <button class="quick-adv-btn disadv" onclick="quickRoll('1d20','skill','disadvantage')" title="Disadvantage">DISADV</button>
                <button class="quick-btn" onclick="quickRoll('1d20','skill','normal')">Skill Check (1d20)</button>
                <button class="quick-adv-btn adv" onclick="quickRoll('1d20','skill','advantage')" title="Advantage">ADV</button>
            </div>
            <div class="quick-group">
                <button class="quick-adv-btn disadv" onclick="quickRoll('1d20','init','disadvantage')" title="Disadvantage">DISADV</button>
                <button class="quick-btn" onclick="quickRoll('1d20','init','normal')">Initiative (1d20)</button>
                <button class="quick-adv-btn adv" onclick="quickRoll('1d20','init','advantage')" title="Advantage">ADV</button>
            </div>
            <button class="quick-btn" onclick="quickRoll('4d6','stats','normal')">Ability Scores (4d6)</button>
            <button class="quick-btn" onclick="quickRoll('1d100','percentile','normal')">Percentile (d100)</button>
        </div>
    </div>

    <!-- Custom Roll -->
    <div class="dice-section">
        <h2>Custom Roll</h2>
        <div class="dice-grid">
            <div class="die-type d4">
                <div class="die-name">d4</div>
                <div class="die-controls">
                    <button onclick="changeDie('d4',-1)">−</button>
                    <input type="number" id="d4-count" value="0" min="0" max="99" onchange="onDiceChange()">
                    <button onclick="changeDie('d4',1)">+</button>
                </div>
            </div>
            <div class="die-type d6">
                <div class="die-name">d6</div>
                <div class="die-controls">
                    <button onclick="changeDie('d6',-1)">−</button>
                    <input type="number" id="d6-count" value="0" min="0" max="99" onchange="onDiceChange()">
                    <button onclick="changeDie('d6',1)">+</button>
                </div>
            </div>
            <div class="die-type d8">
                <div class="die-name">d8</div>
                <div class="die-controls">
                    <button onclick="changeDie('d8',-1)">−</button>
                    <input type="number" id="d8-count" value="0" min="0" max="99" onchange="onDiceChange()">
                    <button onclick="changeDie('d8',1)">+</button>
                </div>
            </div>
            <div class="die-type d10">
                <div class="die-name">d10</div>
                <div class="die-controls">
                    <button onclick="changeDie('d10',-1)">−</button>
                    <input type="number" id="d10-count" value="0" min="0" max="99" onchange="onDiceChange()">
                    <button onclick="changeDie('d10',1)">+</button>
                </div>
            </div>
            <div class="die-type d12">
                <div class="die-name">d12</div>
                <div class="die-controls">
                    <button onclick="changeDie('d12',-1)">−</button>
                    <input type="number" id="d12-count" value="0" min="0" max="99" onchange="onDiceChange()">
                    <button onclick="changeDie('d12',1)">+</button>
                </div>
            </div>
            <div class="die-type d20">
                <div class="die-name">d20</div>
                <div class="die-controls">
                    <button onclick="changeDie('d20',-1)">−</button>
                    <input type="number" id="d20-count" value="0" min="0" max="99" onchange="onDiceChange()">
                    <button onclick="changeDie('d20',1)">+</button>
                </div>
            </div>
            <div class="die-type d100">
                <div class="die-name">d100</div>
                <div class="die-controls">
                    <button onclick="changeDie('d100',-1)">−</button>
                    <input type="number" id="d100-count" value="0" min="0" max="99" onchange="onDiceChange()">
                    <button onclick="changeDie('d100',1)">+</button>
                </div>
            </div>
        </div>

        <div class="advantage-row disabled" id="advantage-row">
            <button class="adv-btn active" id="normal-btn" onclick="setAdvantage('normal')">Normal</button>
            <button class="adv-btn adv-advantage" id="advantage-btn" onclick="setAdvantage('advantage')">Advantage</button>
            <button class="adv-btn adv-disadvantage" id="disadvantage-btn" onclick="setAdvantage('disadvantage')">Disadvantage</button>
        </div>
        <div class="adv-label" id="adv-label">Add d20 dice above to enable advantage/disadvantage</div>

        <div class="modifier-section">
            <span>Modifier:</span>
            <input type="number" id="modifier" value="0">
        </div>

        <div class="action-row">
            <button class="roll-btn" onclick="rollDice()">Roll Dice</button>
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <!-- Results modal -->
    <div id="results-modal" class="modal-overlay">
        <div class="modal-inner">
            <button class="close-btn" onclick="closeResults()">&times;</button>
            <div class="result-total" id="total-result">0</div>
            <div class="result-breakdown" id="breakdown"></div>
            <div class="dice-results" id="dice-display"></div>
            <div id="special-text"></div>
        </div>
    </div>

    <nav style="display:flex;justify-content:space-between;align-items:center;margin:2rem 0;padding:1rem;background:#1a1d27;border:1px solid #2e3347;border-radius:8px;">
        <a href="/dnd_core.html" style="color:#60a5fa;text-decoration:none;font-weight:600;">&larr; Core Mechanics</a>
        <a href="/index.html" style="color:#7c8298;text-decoration:none;">Home</a>
        <a href="/dnd_combat.html" style="color:#60a5fa;text-decoration:none;font-weight:600;">Combat &rarr;</a>
    </nav>

    <script>
    let currentAdvantage = 'normal';

    const dieColors = {
        'd4':'#f87171','d6':'#34d399','d8':'#60a5fa',
        'd10':'#a78bfa','d12':'#fbbf24','d20':'#f472b6','d100':'#818cf8'
    };

    // --- Dice count helpers ---
    function changeDie(type, delta) {
        const inp = document.getElementById(type + '-count');
        inp.value = Math.max(0, Math.min(99, (parseInt(inp.value)||0) + delta));
        onDiceChange();
    }

    // Enable/disable advantage row based on whether d20 is in play
    function onDiceChange() {
        const d20count = parseInt(document.getElementById('d20-count').value) || 0;
        const row = document.getElementById('advantage-row');
        const label = document.getElementById('adv-label');
        if (d20count > 0) {
            row.classList.remove('disabled');
            label.textContent = 'Advantage/Disadvantage applies to d20 rolls';
        } else {
            row.classList.add('disabled');
            label.textContent = 'Select a d20 roll to enable advantage/disadvantage';
            setAdvantage('normal');
        }
    }

    function setAdvantage(type) {
        currentAdvantage = type;
        document.querySelectorAll('.adv-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(type + '-btn').classList.add('active');
    }

    // --- Quick rolls ---
    function quickRoll(diceStr, type, advMode) {
        clearAll();
        if (type === 'stats') { rollAbilityScore(); return; }

        // Set advantage mode for this roll
        currentAdvantage = advMode || 'normal';

        const parts = diceStr.split('+');
        const match = parts[0].match(/(\d+)d(\d+)/);
        if (match) {
            document.getElementById('d' + match[2] + '-count').value = parseInt(match[1]);
        }
        if (parts[1]) document.getElementById('modifier').value = parseInt(parts[1]);

        rollDice();
    }

    // --- Ability score roll (4d6 drop lowest) ---
    function rollAbilityScore() {
        const rolls = [];
        for (let i = 0; i < 4; i++) rolls.push(Math.floor(Math.random()*6)+1);
        rolls.sort((a,b) => b-a);
        const kept = rolls.slice(0,3);
        const dropped = rolls[3];
        const total = kept.reduce((s,v)=>s+v,0);

        const display = rolls.map(v => ({value:v, type:'d6', sides:6, dropped: v===dropped && rolls.filter(r=>r===dropped).length===1}));
        showAbilityResult(display, total, kept, dropped);
    }

    function showAbilityResult(rolls, total, kept, dropped) {
        const modal = document.getElementById('results-modal');
        document.getElementById('total-result').textContent = total;
        document.getElementById('breakdown').textContent = '4d6: '+rolls.map(r=>r.value).join(', ')+' | Kept: '+kept.join(', ')+' | Dropped: '+dropped;

        const dd = document.getElementById('dice-display');
        dd.innerHTML = '';
        rolls.forEach(r => {
            const d = document.createElement('div');
            d.className = 'result-die';
            d.style.backgroundColor = r.dropped ? '#555' : dieColors[r.type];
            d.style.borderColor = r.dropped ? '#444' : dieColors[r.type];
            d.style.opacity = r.dropped ? '0.5' : '1';
            if (r.dropped) d.style.textDecoration = 'line-through';
            d.textContent = r.value;
            dd.appendChild(d);
        });

        const sp = document.getElementById('special-text');
        sp.innerHTML = '';
        if (total >= 15) sp.innerHTML = '<div class="critical-text">🌟 Excellent Ability Score!</div>';
        else if (total <= 8) sp.innerHTML = '<div class="fumble-text">😬 Low Ability Score</div>';

        modal.classList.add('visible');
    }

    // --- Custom roll ---
    function rollDice() {
        const types = ['d4','d6','d8','d10','d12','d20','d100'];
        const mod = parseInt(document.getElementById('modifier').value) || 0;
        let allRolls = [], total = mod, hasD20 = false;

        types.forEach(dt => {
            const n = parseInt(document.getElementById(dt+'-count').value) || 0;
            if (n > 0) {
                const sides = parseInt(dt.substring(1));
                if (sides === 20) hasD20 = true;
                for (let i = 0; i < n; i++) {
                    let roll = Math.floor(Math.random()*sides)+1;
                    if (sides === 20 && currentAdvantage !== 'normal') {
                        const r2 = Math.floor(Math.random()*sides)+1;
                        const kept = currentAdvantage === 'advantage' ? Math.max(roll,r2) : Math.min(roll,r2);
                        const dropped = currentAdvantage === 'advantage' ? Math.min(roll,r2) : Math.max(roll,r2);
                        allRolls.push({value:kept, altValue:dropped, type:dt, sides:sides});
                        total += kept;
                    } else {
                        allRolls.push({value:roll, type:dt, sides:sides});
                        total += roll;
                    }
                }
            }
        });

        if (allRolls.length === 0) return; // nothing selected

        showResults(allRolls, total, mod, hasD20);
    }

    function showResults(rolls, total, mod, hasD20) {
        const modal = document.getElementById('results-modal');
        document.getElementById('total-result').textContent = total;

        const grouped = {};
        rolls.forEach(r => { if(!grouped[r.type]) grouped[r.type]=[]; grouped[r.type].push({val:r.value, alt:r.altValue}); });
        const parts = [];
        Object.keys(grouped).forEach(dt => {
            const vals = grouped[dt].map(r => {
                if (r.alt !== undefined) return r.val + ' / ' + r.alt;
                return '' + r.val;
            });
            parts.push(grouped[dt].length+dt+': '+vals.join(', '));
        });
        if (mod !== 0) parts.push('Modifier: '+(mod>=0?'+':'')+mod);
        if (currentAdvantage !== 'normal' && hasD20) parts.push('('+currentAdvantage+')');
        document.getElementById('breakdown').textContent = parts.join(' | ');

        const dd = document.getElementById('dice-display');
        dd.innerHTML = '';
        rolls.forEach(r => {
            if (r.altValue !== undefined) {
                // Show dropped die first (dimmed)
                const disc = document.createElement('div');
                disc.className = 'result-die';
                disc.style.backgroundColor = '#555';
                disc.style.borderColor = '#444';
                disc.style.opacity = '0.45';
                disc.style.textDecoration = 'line-through';
                disc.textContent = r.altValue;
                dd.appendChild(disc);
            }
            const d = document.createElement('div');
            d.className = 'result-die';
            d.style.backgroundColor = dieColors[r.type];
            d.style.borderColor = dieColors[r.type];
            d.textContent = r.value;
            if (r.sides===20 && r.value===20) d.classList.add('critical');
            if (r.sides===20 && r.value===1) d.classList.add('fumble');
            dd.appendChild(d);
        });

        const sp = document.getElementById('special-text');
        sp.innerHTML = '';
        const d20s = rolls.filter(r=>r.sides===20);
        if (d20s.some(r=>r.value===20)) sp.innerHTML += '<div class="critical-text">🎲 Natural 20! Critical Hit!</div>';
        if (d20s.some(r=>r.value===1)) sp.innerHTML += '<div class="fumble-text">💀 Natural 1! Critical Fumble!</div>';

        modal.classList.add('visible');
    }

    // --- Clear & close ---
    function clearAll() {
        ['d4','d6','d8','d10','d12','d20','d100'].forEach(dt => { document.getElementById(dt+'-count').value = 0; });
        document.getElementById('modifier').value = 0;
        setAdvantage('normal');
        onDiceChange();
        closeResults();
    }

    function closeResults() {
        document.getElementById('results-modal').classList.remove('visible');
    }

    document.getElementById('results-modal').addEventListener('click', function(e) {
        if (e.target === this) closeResults();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) rollDice();
        else if (e.key === 'Escape') closeResults();
    });
    </script>
</body>
</html>
